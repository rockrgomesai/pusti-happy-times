services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: pusti-mongodb-dev
    restart: unless-stopped
    ports:
      # Host 27019 → container 27017. Avoids collision with any local/system mongod on 27017.
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: pusti_happy_times
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - pusti-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: pusti-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pusti-network

  # MongoDB Admin Interface (Mongo Express)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: pusti-mongo-express-dev
    restart: unless-stopped
    ports:
      # Host 8082 → container 8081. 8081 is reserved for the React Native Metro bundler.
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: false
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      - mongodb
    networks:
      - pusti-network

# Named volumes for data persistence
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

# Custom network for service communication
networks:
  pusti-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
