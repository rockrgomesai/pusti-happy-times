name: Build & Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build Next.js frontend, upload artifact
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      # Upload only the built output — NOT the source
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/.next/
            frontend/public/
            frontend/package.json
            frontend/package-lock.json
            frontend/next.config.mjs
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy both backend (source) and frontend (build only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout (backend source only)
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist/

      # ── Install rsync on runner ──────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      # ── Deploy backend (plain Node.js source — no build step needed) ─────────
      - name: Deploy backend
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='logs/' \
            --exclude='public/uploads/' \
            --exclude='public/images/' \
            --exclude='seed-*.js' \
            -e "ssh -i ~/.ssh/prod_key -o StrictHostKeyChecking=no" \
            ./backend/ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_BACKEND_PATH }}/

      # ── Deploy frontend (built output only — no source) ──────────────────────
      - name: Deploy frontend build
        run: |
          rsync -az --delete \
            --exclude='node_modules/' \
            -e "ssh -i ~/.ssh/prod_key -o StrictHostKeyChecking=no" \
            ./frontend-dist/ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_FRONTEND_PATH }}/

      # ── Install backend production dependencies on server ────────────────────
      - name: Install backend dependencies & restart PM2
        run: |
          ssh -i ~/.ssh/prod_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
              "cd ${{ secrets.PROD_BACKEND_PATH }} && \
               npm ci --omit=dev --prefer-offline && \
               pm2 reload ecosystem.config.js --env production || \
               pm2 start ecosystem.config.js --env production"

      # ── Install frontend dependencies on server (next start needs them) ──────
      - name: Install frontend dependencies & restart PM2
        run: |
          ssh -i ~/.ssh/prod_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
              "cd ${{ secrets.PROD_FRONTEND_PATH }} && \
               npm ci --omit=dev --prefer-offline && \
               pm2 reload pusti-frontend || \
               pm2 start 'npm start' --name pusti-frontend"

      # ── Health-check ─────────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ secrets.PROD_HOST }}/api/v1/health || \
          curl -f http://${{ secrets.PROD_HOST }}:5000/api/v1/health
